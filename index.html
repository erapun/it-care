<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT CARE - TU RAC</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900">💻 ระบบแจ้งซ่อม / แก้ไขระบบ (IT CARE)</h1>
      <p class="text-gray-600 mt-2">สถาบันวิจัยและให้คำปรึกษาแห่งมหาวิทยาลัยธรรมศาสตร์ (TU RAC)</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">📝 ฟอร์มแจ้งซ่อม</h2>
        <form id="repairForm" onsubmit="submitForm(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">ชื่องาน / ฝ่าย</label>
              <select id="departmentSelect" name="department" required onchange="updateNameDropdown()" class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-white">
                <option value="">-- เลือกชื่องาน / ฝ่าย --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">ชื่อผู้แจ้งซ่อม</label>
              <select id="nameSelect" name="name" required disabled class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-gray-50 cursor-not-allowed">
                <option value="">-- กรุณาเลือกชื่องานก่อน --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">หมวดหมู่ปัญหา</label>
              <select id="categorySelect" name="category" required class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-white">
                <option value="Hardware">Hardware (คอมพิวเตอร์, ปริ้นเตอร์, จอภาพ)</option>
                <option value="Software">Software (Windows, โปรแกรมต่างๆ)</option>
                <option value="Network">Network / Internet</option>
                <option value="Account">Account / Email / Password</option>
                <option value="Other">อื่นๆ</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">รายละเอียดปัญหา</label>
              <textarea id="descriptionInput" name="description" rows="3" required class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none" placeholder="ระบุอาการเสีย หรือปัญหาที่พบ..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm cursor-pointer shadow-sm">
              ส่งข้อมูลแจ้งซ่อม
            </button>
          </div>
        </form>
      </div>

      <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold text-gray-800 flex items-center gap-2">🔍 รายการแจ้งซ่อมทั้งหมด</h2>
          <button onclick="loadTickets()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 py-1.5 px-3 rounded-lg flex items-center gap-1 cursor-pointer">
            🔄 รีเฟรชข้อมูล
          </button>
        </div>
        
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left font-medium text-gray-500">Ticket ID / เวลา</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">ผู้แจ้ง / แผนก</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">ปัญหา</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">สถานะ</th>
              </tr>
            </thead>
            <tbody id="ticketTableBody" class="divide-y divide-gray-100">
              <tr>
                <td colspan="4" class="text-center py-8 text-gray-400">กำลังโหลดตารางข้อมูล...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    const tuRacStaffDB = {
      "ฝ่ายบริหาร": ["พรพรรณ สังเกตุการณ์ (จอย)"],
      "งานบริหารการวิจัย": ["วรรณา แก้วพวง (นา)", "น้ำทิพย์ มีขันทอง (นก)", "ศศินันท์ ลิมพวัฒน์ (ชมพู่)", "สุจิตรา เผ่าชวด (ส้ม)", "นภาพร สมภักดี (นัท)", "เพียงนภา สุขสมพงษ์ (ออย)", "รัศมี พิมพ์วันวงศ์ (ตาล)", "กนกวรรณ อบเชย (พิมพ์1)", "รัตนาภรณ์ ศรแก้วดารา (ลูกปลา)", "กรกนก จิรสถิตพรพงศ์ (พิมพ์2)", "ปณิดา ส่งเสริม (ฝน)", "สุธิดา คำสวาสดิ์ (แน๊ต)", "ณัฐณี เงินกระแชง (ชีส)"],
      "งานบัญชีและการเงิน": ["กานติมา พงษ์ศักดิ์ (กาน)", "จินตญาณ อภินันทกุล (จิน)", "ทิพย์สุวรรณ แจ่มเหมือน (บิ้วตี้)", "ธีรนุช สุทธิแก้ว (โบว์)", "ฐิติพร อ่วมเรืองศรี (ตอง)", "ปวริศา นวะมะรัตน (ส้มโอ)", "บิสมินลาห์ แมะตีเมาะ (ไลลา)"],
      "งานสนับสนุนการวิจัย": ["ชลธิชา ชินสะอาด (หยก)", "พิพัฒน์พงศ์ โทธรรม (บูม)", "อรจิรา ขันธ์เงิน (พลอย)", "สิรินภา เพิ่มสกุลสิน (แนท)"],
      "งานบริหารสำนักงาน": ["สุวรรณี ติวะตันสกุล (ณี)", "ปฐมกานต์ บุนนาค (แพ)", "หทัยชนก พุ่มไสล (เจนนี่)", "ธนกร สุริยะชูโชค (แบงค์)"]
    };

    // 🔗 🌟 บรรทัดที่ 67: ใส่ลิงก์ Web App ล่าสุดของคุณลงไปในเครื่องหมายคำพูดด้านล่างนี้
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx4KlCiSNpE6yON4MUD9MELX4Oxa29JwINzzEt1hCmvA6nwt1PwkyMEAywd8b50EC8xTw/exec";

    document.addEventListener("DOMContentLoaded", function() {
      const deptSelect = document.getElementById("departmentSelect");
      Object.keys(tuRacStaffDB).forEach(dept => {
        const option = document.createElement("option");
        option.value = dept;
        option.text = dept;
        deptSelect.appendChild(option);
      });
      loadTickets();
    });

    function updateNameDropdown() {
      const deptSelect = document.getElementById("departmentSelect");
      const nameSelect = document.getElementById("nameSelect");
      const selectedDept = deptSelect.value;
      nameSelect.innerHTML = '<option value="">-- เลือกชื่อผู้แจ้งซ่อม --</option>';

      if (selectedDept && tuRacStaffDB[selectedDept]) {
        nameSelect.disabled = false;
        nameSelect.classList.remove("bg-gray-50", "cursor-not-allowed");
        nameSelect.classList.add("bg-white");
        tuRacStaffDB[selectedDept].forEach(staff => {
          const option = document.createElement("option");
          option.value = staff;
          option.text = staff;
          nameSelect.appendChild(option);
        });
      } else {
        nameSelect.disabled = true;
        nameSelect.classList.remove("bg-white");
        nameSelect.classList.add("bg-gray-50", "cursor-not-allowed");
      }
    }

    function loadTickets() {
      const tbody = document.getElementById("ticketTableBody");
      const oldScript = document.getElementById("jsonp-fetcher");
      if(oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "jsonp-fetcher";
      script.src = `${WEB_APP_URL}?action=get&callback=renderTable`;
      document.body.appendChild(script);
    }

    function renderTable(response) {
      const tbody = document.getElementById("ticketTableBody");
      if (response.status !== "success" || !response.data || response.data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">ยังไม่มีข้อมูลการแจ้งซ่อม</td></tr>`;
        return;
      }

      let html = "";
      response.data.forEach(ticket => {
        let badgeColor = "bg-yellow-100 text-yellow-800";
        if(ticket.Status === "กำลังดำเนินงาน") badgeColor = "bg-blue-100 text-blue-800";
        if(ticket.Status === "เสร็จสิ้น") badgeColor = "bg-green-100 text-green-800";
        if(ticket.Status === "ยกเลิก") badgeColor = "bg-red-100 text-red-800";

        html += `
          <tr class="hover:bg-gray-50 transition duration-150">
            <td class="px-4 py-3">
              <span class="font-bold text-blue-600 block">${ticket["Ticket ID"] || '-'}</span>
              <span class="text-xs text-gray-400 block mt-0.5">${ticket.Timestamp || '-'}</span>
            </td>
            <td class="px-4 py-3">
              <div class="font-medium text-gray-900">${ticket.Name || '-'}</div>
              <div class="text-xs text-gray-500 mt-0.5">${ticket.Department || '-'}</div>
            </td>
            <td class="px-4 py-3 max-w-xs">
              <span class="inline-block text-xs font-semibold px-2 py-0.5 rounded bg-gray-100 text-gray-600 mb-1">${ticket.Category || '-'}</span>
              <div class="text-gray-600 truncate text-xs" title="${ticket.Description}">${ticket.Description || '-'}</div>
            </td>
            <td class="px-4 py-3">
              <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${badgeColor}">
                ${ticket.Status || 'รอดำเนินการ'}
              </span>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    // ระบบส่งข้อมูลแบบ JSONP ขาไป เสถียรและปลดล็อกปัญหา CORS ข้ามแดน
    function submitForm(e) {
      if (e) e.preventDefault();
      
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "กำลังส่งข้อมูล...";

      const valDept = encodeURIComponent(document.getElementById("departmentSelect").value);
      const valName = encodeURIComponent(document.getElementById("nameSelect").value);
      const valCat = encodeURIComponent(document.getElementById("categorySelect").value);
      const valDesc = encodeURIComponent(document.getElementById("descriptionInput").value);

      const oldSender = document.getElementById("jsonp-sender");
      if(oldSender) oldSender.remove();

      // บังคับยิงข้อมูลผ่านท่อคำสั่ง action=send
      const script = document.createElement("script");
      script.id = "jsonp-sender";
      script.src = `${WEB_APP_URL}?action=send&department=${valDept}&name=${valName}&category=${valCat}&description=${valDesc}&callback=afterSubmit`;
      document.body.appendChild(script);
    }

    function afterSubmit(response) {
      const btn = document.getElementById("submitBtn");
      const form = document.getElementById("repairForm");
      
      if(response && response.status === "success") {
        Swal.fire({
          title: 'ส่งข้อมูลสำเร็จ!',
          text: 'ระบบบันทึกรายการแจ้งซ่อม และส่งอีเมลเรียบร้อยแล้วค่ะ',
          icon: 'success',
          confirmButtonText: 'ตกลง',
          confirmButtonColor: '#2563eb',
          customClass: { popup: 'rounded-2xl' }
        });
        
        form.reset();
        updateNameDropdown();
        btn.disabled = false;
        btn.innerText = "ส่งข้อมูลแจ้งซ่อม";
        
        loadTickets();
      }
    }
  </script>
</body>
</html>
