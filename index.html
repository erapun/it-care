<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT CARE - TU RAC</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900">💻 ระบบแจ้งซ่อม / แก้ไขระบบ (IT CARE)</h1>
      <p class="text-gray-600 mt-2">สถาบันวิจัยและให้คำปรึกษาแห่งมหาวิทยาลัยธรรมศาสตร์ (TU RAC)</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">📝 ฟอร์มแจ้งซ่อม</h2>
        
        <form id="repairForm" action="https://script.google.com/macros/s/AKfycbx4KlCiSNpE6yON4MUD9MELX4Oxa29JwINzzEt1hCmvA6nwt1PwkyMEAywd8b50EC8xTw/exec" method="POST" target="hidden_iframe" onsubmit="submitForm()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">ชื่องาน / ฝ่าย</label>
              <select id="departmentSelect" name="department" required onchange="updateNameDropdown()" class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-white">
                <option value="">-- เลือกชื่องาน / ฝ่าย --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">ชื่อผู้แจ้งซ่อม</label>
              <select id="nameSelect" name="name" required disabled class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-gray-50 cursor-not-allowed">
                <option value="">-- กรุณาเลือกชื่องานก่อน --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">หมวดหมู่ปัญหา</label>
              <select name="category" required class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none bg-white">
                <option value="Hardware">Hardware (คอมพิวเตอร์, ปริ้นเตอร์, จอภาพ)</option>
                <option value="Software">Software (Windows, โปรแกรมต่างๆ)</option>
                <option value="Network">Network / Internet</option>
                <option value="Account">Account / Email / Password</option>
                <option value="Other">อื่นๆ</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">รายละเอียดปัญหา</label>
              <textarea name="description" rows="3" required class="mt-1 block w-full rounded-lg border border-gray-300 p-2 text-sm focus:outline-none" placeholder="ระบุอาการเสีย..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm cursor-pointer shadow-sm">
              ส่งข้อมูลแจ้งซ่อม
            </button>
          </div>
        </form>
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
      </div>

      <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">🔍 รายการสถานะการแจ้งซ่อม</h2>
        
        <div class="w-full h-[450px] overflow-hidden rounded-xl border border-gray-100">
          <iframe src="https://docs.google.com/spreadsheets/d/1VrAyJzvYTHK5D5JCqW_0HgxBRI6u1l2Dfuu9IYGoZPA/htmlembed?widget=false&headers=false&chrome=false&gid=0" class="w-full h-full border-0"></iframe>
        </div>
      </div>

    </div>
  </div>

  <script>
    const tuRacStaffDB = {
      "ฝ่ายบริหาร": ["พรพรรณ สังเกตุการณ์ (จอย)"],
      "งานบริหารการวิจัย": ["วรรณา แก้วพวง (นา)", "น้ำทิพย์ มีขันทอง (นก)", "ศศินันท์ ลิมพวัฒน์ (ชมพู่)", "สุจิตรา เผ่าชวด (ส้ม)", "นภาพร สมภักดี (นัท)", "เพียงนภา สุขสมพงษ์ (ออย)", "รัศมี พิมพ์วันวงศ์ (ตาล)", "กนกวรรณ อบเชย (พิมพ์1)", "รัตนาภรณ์ ศรแก้วดารา (ลูกปลา)", "กรกนก จิรสถิตพรพงศ์ (พิมพ์2)", "ปณิดา ส่งเสริม (ฝน)", "สุธิดา คำสวาสดิ์ (แน๊ต)", "ณัฐณี เงินกระแชง (ชีส)"],
      "งานบัญชีและการเงิน": ["กานติมา พงษ์ศักดิ์ (กาน)", "จินตญาณ อภินันทกุล (จิน)", "ทิพย์สุวรรณ แจ่มเหมือน (บิ้วตี้)", "ธีรนุช สุทธิแก้ว (โบว์)", "ฐิติพร อ่วมเรืองศรี (ตอง)", "ปวริศา นวะมะรัตน (ส้มโอ)", "บิสมินลาห์ แมะตีเมาะ (ไลลา)"],
      "งานสนับสนุนการวิจัย": ["ชลธิชา ชินสะอาด (หยก)", "พิพัฒน์พงศ์ โทธรรม (บูม)", "อรจิรา ขันธ์เงิน (พลอย)", "สิรินภา เพิ่มสกุลสิน (แนท)"],
      "งานบริหารสำนักงาน": ["สุวรรณี ติวะตันสกุล (ณี)", "ปฐมกานต์ บุนนาค (แพ)", "หทัยชนก พุ่มไสล (เจนนี่)", "ธนกร สุริยะชูโชค (แบงค์)"]
    };

    document.addEventListener("DOMContentLoaded", function() {
      const deptSelect = document.getElementById("departmentSelect");
      Object.keys(tuRacStaffDB).forEach(dept => {
        const option = document.createElement("option");
        option.value = dept;
        option.text = dept;
        deptSelect.appendChild(option);
      });
    });

    function updateNameDropdown() {
      const deptSelect = document.getElementById("departmentSelect");
      const nameSelect = document.getElementById("nameSelect");
      const selectedDept = deptSelect.value;
      nameSelect.innerHTML = '<option value="">-- เลือกชื่อผู้แจ้งซ่อม --</option>';

      if (selectedDept && tuRacStaffDB[selectedDept]) {
        nameSelect.disabled = false;
        nameSelect.classList.remove("bg-gray-50", "cursor-not-allowed");
        nameSelect.classList.add("bg-white");
        tuRacStaffDB[selectedDept].forEach(staff => {
          const option = document.createElement("option");
          option.value = staff;
          option.text = staff;
          nameSelect.appendChild(option);
        });
      } else {
        nameSelect.disabled = true;
        nameSelect.classList.remove("bg-white");
        nameSelect.classList.add("bg-gray-50", "cursor-not-allowed");
      }
    }

    function submitForm() {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "กำลังบันทึกข้อมูล...";

      setTimeout(() => {
        Swal.fire({
          title: 'ส่งข้อมูลสำเร็จ!',
          text: 'ระบบได้บันทึกรายการแจ้งซ่อมเข้า Google Sheets เรียบร้อยแล้วค่ะ',
          icon: 'success',
          confirmButtonText: 'รับทราบ',
          confirmButtonColor: '#2563eb',
          customClass: { popup: 'rounded-2xl' }
        });
        
        document.getElementById("repairForm").reset();
        updateNameDropdown();
        btn.disabled = false;
        btn.innerText = "ส่งข้อมูลแจ้งซ่อม";
        
        // สั่งให้ตารางรีเฟรชอัปเดตข้อมูลใหม่ในอีก 1 วินาทีถัดไป
        setTimeout(() => {
          const iframe = document.querySelector('iframe[src*="spreadsheets"]');
          if(iframe) iframe.src = iframe.src;
        }, 1000);
      }, 1800);
    }
  </script>
</body>
</html>
