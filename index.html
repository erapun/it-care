<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT CARE TU-RAC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        /* สไตล์สำหรับปุ่มเมนูที่กำลังใช้งาน */
        .active-tab { background-color: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col items-center justify-start">

    <div class="w-full max-w-5xl flex flex-col gap-6">
        
        <div class="glass p-4 rounded-2xl shadow-xl text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">🛠 IT CARE TU-RAC</h1>
            
            <div class="flex bg-black/20 p-1.5 rounded-xl border border-white/10 w-full md:w-auto">
                <button id="tab1Btn" onclick="switchTab(1)" class="flex-1 md:flex-none px-6 py-2 rounded-lg text-sm transition font-medium active-tab">
                    📝 เมนู 1: บันทึกข้อมูลแจ้งซ่อม
                </button>
                <button id="tab2Btn" onclick="switchTab(2)" class="flex-1 md:flex-none px-6 py-2 rounded-lg text-sm transition font-medium">
                    📋 เมนู 2: ประวัติและสถานะ
                </button>
            </div>
        </div>

        <div id="tab1Content" class="glass p-6 md:p-8 rounded-3xl shadow-2xl text-white">
            <h2 class="text-xl font-bold mb-6 border-b pb-3 border-white/20 flex items-center gap-2">📝 ฟอร์มบันทึกข้อมูลแจ้งซ่อม</h2>
            
            <form id="itCareForm" class="space-y-5 text-slate-800 max-w-xl mx-auto">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-white">1. เลือกงาน (ฝ่าย)</label>
                    <select id="department" name="data[department]" required class="w-full p-3 rounded-xl bg-white/90 outline-none" onchange="updateUsers()">
                        <option value="" disabled selected>-- เลือกฝ่าย --</option>
                        <option value="ฝ่ายบริหาร">ฝ่ายบริหาร</option>
                        <option value="งานบริหารการวิจัย">งานบริหารการวิจัย</option>
                        <option value="งานบัญชีและการเงิน">งานบัญชีและการเงิน</option>
                        <option value="งานสนับสนุนการวิจัย">งานสนับสนุนการวิจัย</option>
                        <option value="งานบริหารสำนักงาน">งานบริหารสำนักงาน</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-white">2. ชื่อผู้แจ้งแก้ไข</label>
                    <select id="userName" name="data[name]" required class="w-full p-3 rounded-xl bg-white/90 outline-none">
                        <option value="" disabled selected>-- กรุณาเลือกงาน/ฝ่ายก่อน --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-white">3. หมวดหมู่ปัญหา</label>
                    <select id="category" name="data[category]" required class="w-full p-3 rounded-xl bg-white/90 outline-none">
                        <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                        <option value="Hardware">ฮาร์ดแวร์ (คอม/ปริ้น/สแกน)</option>
                        <option value="Software">ซอฟต์แวร์ (ระบบ/โปรแกรม/เน็ตเวิร์ก)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-white">4. รายละเอียดอาการ</label>
                    <textarea name="data[description]" rows="4" required class="w-full p-3 rounded-xl bg-white/90 outline-none placeholder-gray-400" placeholder="ระบุอาการพัง หรือระบบที่ต้องการให้แก้ไข..."></textarea>
                </div>

                <input type="hidden" name="data[status]" value="รอดำเนินการ">
                <input type="hidden" name="data[timestamp]" id="timestamp">

                <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 rounded-xl font-bold text-white text-lg shadow-lg transition transform hover:-translate-y-0.5">
                    ส่งเรื่องแจ้งซ่อม
                </button>
            </form>
        </div>

        <div id="tab2Content" class="glass p-6 rounded-3xl shadow-2xl text-white flex flex-col hidden">
            <div class="flex justify-between items-center mb-6 border-b pb-3 border-white/20">
                <h2 class="text-xl font-bold flex items-center gap-2">📋 ประวัติและสถานะการแจ้งซ่อมทั้งหมด</h2>
                <button onclick="fetchExistingData()" class="px-4 py-2 bg-white/20 hover:bg-white/30 border border-white/10 rounded-xl text-sm transition flex items-center gap-1">
                    🔄 รีเฟรชข้อมูล
                </button>
            </div>
            
            <div class="overflow-x-auto max-h-[600px]">
                <table class="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                    <thead class="bg-white/10 uppercase text-xs sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="p-4">วัน-เวลา</th>
                            <th class="p-4">ชื่อผู้แจ้ง</th>
                            <th class="p-4">ฝ่าย</th>
                            <th class="p-4">หมวดหมู่ปัญหา</th>
                            <th class="p-4">รายละเอียดอาการ</th>
                            <th class="p-4 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTableBody" class="divide-y divide-white/10">
                        <tr>
                            <td colspan="6" class="p-4 text-center text-slate-300">กำลังโหลดข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 🌟 [จุดที่ 1] ใส่ URL จาก SheetDB ของคุณตรงนี้
        const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/wc3i475ce8v8v'; 

        // 🌟 [จุดที่ 2] ใส่ URL จาก Formspree ของคุณตรงนี้เพื่อส่งเมล
        const FORMSPREE_URL = 'https://formspree.io/f/mjgzlzvn'; 

        const userDatabase = {
            "ฝ่ายบริหาร": ["พรพรรณ สังเกตุการณ์ (จอย)"],
            "งานบริหารการวิจัย": ["วรรณา แก้วพวง (นา)", "น้ำทิพย์ มีขันทอง (นก)", "ศศินันท์ ลิมพวัฒน์ (ชมพู่)", "สุจิตรา เผ่าชวด (ส้ม)", "นภาพร สมภักดี (นัท)", "เพียงนภา สุขสมพงษ์ (ออย)", "รัศมี พิมพ์วันวงศ์ (ตาล)", "กนกวรรณ อบเชย (พิมพ์1)", "รัตนาภรณ์ ศรแก้วดารา (ลูกปลา)", "กรกนก จิรสถิตพรพงศ์ (พิมพ์2)", "ปณิดา ส่งเสริม (ฝน)", "สุธิดา คำสวาสดิ์ (แน๊ต)", "ณัฐณี เงินกระแชง (ชีส)"],
            "งานบัญชีและการเงิน": ["กานติมา พงษ์ศักดิ์ (กาน)", "จินตญาณ อภินันทกุล (จิน)", "ทิพย์สุวรรณ แจ่มเหมือน (บิ้วตี้)", "ฐิติพร อ่วมเรืองศรี (ตอง)", "ปวริศา นวะมะรัตน (ส้มโอ)", "บิสมินลาห์ แมะตีเมาะ (ไลลา)"],
            "งานสนับสนุนการวิจัย": ["ชลธิชา ชินสะอาด (หยก)", "พิพัฒน์พงศ์ โทธรรม (บูม)", "อรจิรา ขันธ์เงิน (พลอย)", "สิรินภา เพิ่มสกุลสิน (แนท)"],
            "งานบริหารสำนักงาน": ["สุวรรณี ติวะตันสกุล (ณี)", "ปฐมกานต์ บุนนาค (แพ)", "หทัยชนก พุ่มไสล (เจนนี่)", "ธนกร สุริยะชูโชค (แบงค์)"]
        };

        // ฟังก์ชันสลับหน้าเมนู
        function switchTab(tabNumber) {
            const tab1Btn = document.getElementById('tab1Btn');
            const tab2Btn = document.getElementById('tab2Btn');
            const tab1Content = document.getElementById('tab1Content');
            const tab2Content = document.getElementById('tab2Content');

            if (tabNumber === 1) {
                tab1Btn.classList.add('active-tab');
                tab2Btn.classList.remove('active-tab');
                tab1Content.classList.remove('hidden');
                tab2Content.classList.add('hidden');
            } else {
                tab2Btn.classList.add('active-tab');
                tab1Btn.classList.remove('active-tab');
                tab2Content.classList.remove('hidden');
                tab1Content.classList.add('hidden');
                fetchExistingData(); // ดึงข้อมูลใหม่ทุกครั้งที่เปิดเมนู 2
            }
        }

        function updateUsers() {
            const deptSelect = document.getElementById('department').value;
            const userSelect = document.getElementById('userName');
            userSelect.innerHTML = '<option value="" disabled selected>-- เลือกรายชื่อ --</option>';

            if (userDatabase[deptSelect]) {
                userDatabase[deptSelect].forEach(user => {
                    userSelect.innerHTML += `<option value="${user}">${user}</option>`;
                });
            }
        }

        function fetchExistingData() {
            if (SHEETDB_API_URL.includes('ใส่_API_URL')) return;

            fetch(SHEETDB_API_URL)
            .then(res => res.json())
            .then(data => {
                const tableBody = document.getElementById('ticketTableBody');
                tableBody.innerHTML = '';
                
                if(!data || data.length === 0 || data.error) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-4 text-center">ยังไม่มีประวัติการแจ้งซ่อม</td></tr>';
                    return;
                }

                data.reverse().forEach(row => {
                    let statusColor = 'bg-yellow-500/30 text-yellow-300 border-yellow-500/50';
                    if (row.status === 'อยู่ระหว่างดำเนินการ') statusColor = 'bg-blue-500/30 text-blue-300 border-blue-500/50';
                    if (row.status === 'เสร็จสิ้น') statusColor = 'bg-green-500/30 text-green-300 border-green-500/50';
                    if (row.status === 'ยกเลิก') statusColor = 'bg-red-500/30 text-red-300 border-red-500/50';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition">
                            <td class="p-4 text-xs text-slate-300">${row.timestamp || '-'}</td>
                            <td class="p-4 font-medium">${row.name || '-'}</td>
                            <td class="p-4 text-xs text-slate-200">${row.department || '-'}</td>
                            <td class="p-4 text-cyan-300 font-semibold">${row.category || '-'}</td>
                            <td class="p-4 text-slate-300 max-w-sm break-words">${row.description || '-'}</td>
                            <td class="p-4 text-center">
                                <span class="px-3 py-1 text-xs font-semibold rounded-full border ${statusColor}">
                                    ${row.status || 'รอดำเนินการ'}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('ticketTableBody').innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-300">ไม่สามารถโหลดข้อมูลได้ ตรวจสอบ SHEETDB_API_URL</td></tr>';
            });
        }

        const form = document.getElementById('itCareForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('timestamp').value = new Date().toLocaleString('th-TH');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึกข้อมูลและส่งเมล...';

            const formData = new FormData(form);

            const sendToSheet = fetch(SHEETDB_API_URL, { method: 'POST', body: formData });
            const sendToEmail = fetch(FORMSPREE_URL, { method: 'POST', body: formData, headers: { 'Accept': 'application/json' } });

            Promise.all([sendToSheet, sendToEmail])
            .then(() => {
                alert('IT CARE TU-RAC รับเรื่องเรียบร้อยแล้ว และส่งเมลแจ้งเตือนช่างแล้ว!');
                form.reset();
                document.getElementById('userName').innerHTML = '<option value="" disabled selected>-- กรุณาเลือกงาน/ฝ่ายก่อน --</option>';
                btn.disabled = false;
                btn.innerText = 'ส่งเรื่องแจ้งซ่อม';
                
                // เมื่อส่งเรื่องเสร็จ ให้สลับหน้าไปเมนู 2 เพื่อโชว์ตารางทันที
                switchTab(2);
            })
            .catch(err => {
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
                btn.disabled = false;
                btn.innerText = 'ส่งเรื่องแจ้งซ่อม';
            });
        });

        // โหลดข้อมูลสแตนด์บายไว้ล่วงหน้า
        window.onload = fetchExistingData;
    </script>
</body>
</html>
